<meta property="og:type" content="article">
<meta property="og:site_name" content="Isaac Bythewood's Blog">
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description }}">
<meta property="og:url" content="{{ request.url }}">
<meta property="og:image" content="{{ url_for('og_image', slug=(page.slug if page.slug is defined else 'blog'), _external=True) }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title }}">
<meta name="twitter:description" content="{{ page.description }}">
<meta name="twitter:image" content="{{ url_for('og_image', slug=(page.slug if page.slug is defined else 'blog'), _external=True) }}">
