<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ post.title }}</title>
  <style>
    @page {
      size: A4;
      margin: 2cm 2cm 2.5cm 2cm;
      @top-left {
        content: "{{ post.title }}";
        font-size: 7pt;
        color: #999;
        font-family: sans-serif;
      }
      @top-right {
        content: "blog.bythewood.me";
        font-size: 7pt;
        color: #999;
        font-family: sans-serif;
      }
      @bottom-center {
        content: counter(page) " / " counter(pages);
        font-size: 7pt;
        color: #999;
        font-family: sans-serif;
      }
    }
    @page :first {
      @top-left { content: none; }
      @top-right { content: none; }
    }
    body {
      font-family: sans-serif;
      font-size: 10pt;
      line-height: 1.5;
      color: #1a1a1a;
    }
    h1 {
      font-size: 1.8em;
      margin-bottom: 0.2em;
    }
    .meta {
      color: #666;
      font-size: 0.9em;
      margin-bottom: 2em;
      padding-bottom: 1em;
      border-bottom: 2px solid #eee;
    }
    .meta .tags {
      margin-top: 0.3em;
    }
    .meta .tag {
      background: #eee;
      padding: 0.1em 0.5em;
      border-radius: 3px;
      font-size: 0.85em;
    }
    .cover-image {
      margin-bottom: 1.5em;
      text-align: center;
    }
    .cover-image img {
      max-width: 100%;
      border-radius: 4px;
    }
    .description {
      font-size: 1.1em;
      color: #555;
      margin-bottom: 1.5em;
    }
    .block-rich-text {
      margin-bottom: 0.5em;
    }
    .block-code {
      margin: 1em 0;
      page-break-inside: avoid;
    }
    .block-code pre {
      background: #f5f5f5;
      border-radius: 4px;
      padding: 0.8em;
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .block-code code {
      font-family: "JetBrains Mono", monospace;
      font-size: 8.5pt;
      line-height: 1.4;
      background: none;
      padding: 0;
      border-radius: 0;
    }
    .block-image {
      margin: 1.5em 0;
      text-align: center;
    }
    .block-image img {
      max-width: 100%;
      max-height: 500px;
      object-fit: contain;
      border-radius: 4px;
    }
    code {
      font-family: "JetBrains Mono", monospace;
      background: #f0f0f0;
      padding: 0.1em 0.3em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    a {
      color: #0e3ff4;
    }
    blockquote {
      border-left: 3px solid #ddd;
      margin-left: 0;
      padding-left: 1em;
      color: #555;
    }
    hr {
      border: none;
      border-top: 2px solid #eee;
      margin: 2em auto;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <h1>{{ post.title }}</h1>
  <div class="meta">
    <div>Isaac Bythewood &middot; {{ post.date }} &middot; {{ post.read_time }} min read</div>
    {% if post.tags %}
    <div class="tags">
      {% for tag in post.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>

  {% if post.cover_image %}
  <div class="cover-image">
    <img src="/content/images/{{ post.cover_image }}" alt="{{ post.title }}">
  </div>
  {% endif %}

  {% if post.description %}
  <div class="description">{{ post.description }}</div>
  {% endif %}

  <article>
    {{ post.body_html_pdf|safe }}
  </article>

</body>
</html>
